# Release Android do app Remote Pi (app/).
#
# Trigger: tag `app-v<versão>` (a versão DEVE bater com app/pubspec.yaml).
# Produz: GitHub Release com `RemotePi.apk` assinado (keystore release) +
# SHA256SUMS. Sem lojas — distribuição direta do APK.
#
# Guarda anti-debug: o Gradle do app cai silenciosamente pras debug keys se o
# key.properties faltar, então o job compara o fingerprint do certificado do
# APK com o do keystore e FALHA se divergirem.

name: app-release

on:
  push:
    tags: ["app-v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag da release (ex: app-v1.1.0); precisa existir"
        required: true

permissions:
  contents: write

concurrency:
  group: app-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  FLUTTER_VERSION: "3.44.4"

jobs:
  android:
    name: APK assinado
    runs-on: ubuntu-24.04
    defaults: { run: { working-directory: app } }
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Valida tag ↔ pubspec
        id: v
        run: |
          VERSION="${RELEASE_TAG#app-v}"
          PUBSPEC=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)
          if [ "$VERSION" != "$PUBSPEC" ]; then
            echo "::error::tag $RELEASE_TAG pede $VERSION mas o pubspec do app está em $PUBSPEC"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Restaura keystore e key.properties
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          mkdir -p android/signing
          echo "$ANDROID_KEYSTORE" | base64 -d > android/signing/remotepi-release.jks
          cat > android/key.properties <<EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=signing/remotepi-release.jks
          EOF

      - name: Build APK release
        run: |
          flutter pub get
          flutter build apk --release

      - name: Verifica assinatura (anti-fallback de debug)
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          APK=build/app/outputs/flutter-apk/app-release.apk
          BT=$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)
          APK_CERT=$("$ANDROID_HOME/build-tools/$BT/apksigner" verify --print-certs "$APK" \
            | grep -m1 "SHA-256 digest" | awk '{print $NF}' | tr -d ':' | tr '[:upper:]' '[:lower:]')
          KS_CERT=$(keytool -list -v -keystore android/signing/remotepi-release.jks \
            -alias "$ANDROID_KEY_ALIAS" -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            | grep -m1 "SHA256:" | awk '{print $NF}' | tr -d ':' | tr '[:upper:]' '[:lower:]')
          echo "apk:      $APK_CERT"
          echo "keystore: $KS_CERT"
          if [ -z "$APK_CERT" ] || [ "$APK_CERT" != "$KS_CERT" ]; then
            echo "::error::APK não está assinado com o keystore release (fallback de debug?)"
            exit 1
          fi

      - name: Gera latest.json (manifest do app)
        run: |
          VERSION="${{ steps.v.outputs.version }}"
          mkdir -p out
          cp build/app/outputs/flutter-apk/app-release.apk out/RemotePi.apk
          (cd out && sha256sum RemotePi.apk > SHA256SUMS)
          BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}"
          jq -n --arg version "$VERSION" --arg date "$(date -u +%F)" \
            --arg notes "Remote Pi (app) ${VERSION}" \
            --arg url "$BASE/RemotePi.apk" \
            --arg sha256 "$(sha256sum out/RemotePi.apk | cut -d' ' -f1)" \
            --argjson size "$(stat -c%s out/RemotePi.apk)" \
            '{version:$version, date:$date, notes:$notes, artifacts:[
               {platform:"android", arch:"universal", format:"apk",
                url:$url, sha256:$sha256, size:$size}]}' \
            > out/latest.json
          cat out/latest.json

      - name: Cria (ou atualiza) a GitHub Release
        run: |
          VERSION="${{ steps.v.outputs.version }}"
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" out/RemotePi.apk out/SHA256SUMS out/latest.json --clobber
          else
            NOTES_FILE=$(mktemp)
            {
              echo "APK Android assinado — instalação direta. Conferir integridade com o SHA256SUMS."
              echo ""
              echo "---"
              echo "**Publicação no site (gate manual):** baixe o \`latest.json\` desta release e coloque em \`/Users/flutterando/app/data/\` no host do rp-s3 — só então o site e o aviso in-app passam a ofertar esta versão."
            } > "$NOTES_FILE"
            gh release create "$RELEASE_TAG" out/RemotePi.apk out/SHA256SUMS out/latest.json \
              --title "Remote Pi (app) ${VERSION}" \
              --notes-file "$NOTES_FILE" \
              --latest=false
          fi

      - name: Resumo
        run: |
          {
            echo "## Remote Pi app ${{ steps.v.outputs.version }} — APK publicado"
            echo ""
            echo "Release: https://github.com/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG}"
            echo ""
            echo "Asset: \`RemotePi.apk\` (assinado com o keystore release, verificado no job)."
            echo ""
            echo "**Próximo passo (manual):** baixar o \`latest.json\` da release e"
            echo "colocar no rp-s3 (\`/Users/flutterando/app/data/\`) pra ir ao ar no site e no aviso in-app."
          } >> "$GITHUB_STEP_SUMMARY"
