# Release do Cockpit (plano 43, passo 3).
#
# Trigger: tag `cockpit-v<versão>` (a versão DEVE bater com o pubspec.yaml).
# Produz: GitHub Release com 6 artefatos + SHA256SUMS + latest.json.
# Publicação no site é MANUAL (gate): baixar o latest.json da release e colocar
# no rp-s3 (volume /Users/flutterando/cockpit/data) — ver rp-s3/README.md.
#
# Runbook por plataforma: cockpit/packaging/README.md.

name: cockpit-release

on:
  push:
    tags: ["cockpit-v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag da release (ex: cockpit-v1.0.0); precisa existir"
        required: true

permissions:
  contents: write

concurrency:
  group: cockpit-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  FLUTTER_VERSION: "3.44.4"

jobs:
  meta:
    name: Valida tag ↔ pubspec
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.v.outputs.version }}
      build: ${{ steps.v.outputs.build }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - id: v
        run: |
          VERSION="${RELEASE_TAG#cockpit-v}"
          FULL=$(grep '^version:' cockpit/pubspec.yaml | awk '{print $2}')
          PUBSPEC="${FULL%%+*}"
          BUILD="${FULL##*+}"
          if [ "$VERSION" != "$PUBSPEC" ]; then
            echo "::error::tag $RELEASE_TAG pede $VERSION mas o pubspec está em $PUBSPEC"
            exit 1
          fi
          # Plano 47: o Sparkle (macOS) compara CFBundleVersion (o +n). Sem build
          # number o self-update não detecta a versão nova — exigir +n explícito.
          if [ "$BUILD" = "$FULL" ] || [ -z "$BUILD" ]; then
            echo "::error::pubspec precisa de build number (ex: $VERSION+8) pro Sparkle comparar a versão"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"

  macos:
    name: macOS dmg (universal, notarizado)
    needs: meta
    runs-on: macos-latest
    defaults: { run: { working-directory: cockpit } }
    env:
      VERSION: ${{ needs.meta.outputs.version }}
      SIGN_ID: "Developer ID Application: Jacob Moura (U843T2P7A2)"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Importa certificado Developer ID em keychain temporário
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASS=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          echo "$MACOS_CERT_P12" | base64 -d > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASS" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          rm "$RUNNER_TEMP/cert.p12"

      - name: Build · sign · notarize · zip (Sparkle) · dmg
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          flutter pub get
          flutter build macos --release
          APP="build/macos/Build/Products/Release/Cockpit.app"
          # Assina o .app (Developer ID + Hardened Runtime + timestamp). --deep
          # cobre os componentes do Sparkle aninhados (Sparkle.framework,
          # Autoupdate, Updater.app, XPCServices), exigência da notarização.
          codesign --force --deep --options runtime --timestamp \
            --entitlements macos/Runner/Release.entitlements \
            --sign "$SIGN_ID" "$APP"
          # O --deep reassinou o cockpit-hook (Contents/Resources) SEM as
          # entitlements dele. É um exe AOT do Dart: sob hardened runtime sem
          # allow-jit/allow-unsigned-executable-memory o macOS o mata (SIGKILL).
          # Reassina o helper com as entitlements certas e re-sela o topo do app
          # (sem --deep, pra não reassinar/estragar de novo o helper).
          codesign --force --options runtime --timestamp \
            --entitlements macos/cockpit_hook.entitlements \
            --sign "$SIGN_ID" "$APP/Contents/Resources/cockpit-hook"
          # Mesmo caso do cockpit-cli: exe AOT do Dart solto em Resources/. O
          # --deep NÃO assina Mach-O avulso em Resources/ (só trata code conhecido
          # — frameworks/plugins/XPC), então ele saía sem Developer ID, sem
          # timestamp e sem hardened runtime → notarização Invalid. Assina explícito.
          codesign --force --options runtime --timestamp \
            --entitlements macos/cockpit_hook.entitlements \
            --sign "$SIGN_ID" "$APP/Contents/Resources/cockpit-cli"
          codesign --force --options runtime --timestamp \
            --entitlements macos/Runner/Release.entitlements \
            --sign "$SIGN_ID" "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"
          mkdir -p dist
          echo "$APPLE_API_KEY" | base64 -d > "$RUNNER_TEMP/apikey.p8"
          notarize() {
            local out
            out=$(xcrun notarytool submit "$1" --key "$RUNNER_TEMP/apikey.p8" \
              --key-id "$APPLE_API_KEY_ID" --issuer "$APPLE_API_ISSUER" --wait 2>&1)
            echo "$out"
            # Em rejeição (Invalid) o submit não traz os motivos; puxa o log com os
            # issues (arquivo + razão) pra diagnosticar sem caça manual.
            if echo "$out" | grep -q "status: Invalid"; then
              local id
              id=$(echo "$out" | grep -m1 -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}')
              echo "::error::Notarização Invalid — log da submissão $id:"
              xcrun notarytool log "$id" --key "$RUNNER_TEMP/apikey.p8" \
                --key-id "$APPLE_API_KEY_ID" --issuer "$APPLE_API_ISSUER" || true
              return 1
            fi
          }
          # 1) Notariza o .app (submetendo um zip) e grampeia o ticket no bundle.
          ditto -c -k --keepParent "$APP" "$RUNNER_TEMP/notarize-app.zip"
          notarize "$RUNNER_TEMP/notarize-app.zip"
          xcrun stapler staple "$APP"
          # 2) Artefato de update do Sparkle (plano 47): zip do .app já
          #    notarizado+stapled — Sparkle troca o bundle in-place (zip é o
          #    caminho recomendado, não o dmg). NÃO entra no latest.json.
          ditto -c -k --keepParent "$APP" "dist/Cockpit-${VERSION}-macos.zip"
          # 3) DMG de primeira instalação, a partir do .app já stapled.
          STAGE=$(mktemp -d)
          cp -R "$APP" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          DMG="dist/RemotePiCockpit-${VERSION}-macos-universal.dmg"
          hdiutil create -volname "Remote Pi Cockpit" -srcfolder "$STAGE" -ov -format UDZO "$DMG"
          rm -rf "$STAGE"
          codesign --force --timestamp --sign "$SIGN_ID" "$DMG"
          notarize "$DMG"
          xcrun stapler staple "$DMG"
          spctl -a -t open --context context:primary-signature -vv "$DMG"
          rm "$RUNNER_TEMP/apikey.p8"

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          # dmg (primeira instalação) + Cockpit-<v>-macos.zip (update Sparkle).
          path: cockpit/dist/*
          if-no-files-found: error

  windows:
    name: Windows exe (x64, Inno Setup)
    needs: meta
    runs-on: windows-latest
    defaults: { run: { working-directory: cockpit, shell: bash } }
    env:
      VERSION: ${{ needs.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Prepara Fastforge e Inno Setup
        run: |
          dart pub global activate fastforge
          echo "C:\\Program Files (x86)\\Inno Setup 6" >> "$GITHUB_PATH"

      - name: Build + empacota
        run: |
          flutter pub get
          flutter build windows --release
          dart pub global run fastforge:main package --platform windows --targets exe
          EXE=$(find dist -name "*.exe" | head -1)
          test -n "$EXE"
          mkdir -p out
          mv "$EXE" "out/RemotePiCockpit-Setup-${VERSION}-windows-x64.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: cockpit/out/*.exe
          if-no-files-found: error

  linux:
    name: Linux deb+rpm (${{ matrix.deb_arch }})
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            deb_arch: amd64
            rpm_arch: x86_64
          - runner: ubuntu-24.04-arm
            deb_arch: arm64
            rpm_arch: aarch64
    runs-on: ${{ matrix.runner }}
    defaults: { run: { working-directory: cockpit } }
    env:
      VERSION: ${{ needs.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: Flutter x64 (SDK empacotado)
        if: matrix.deb_arch == 'amd64'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # Não existe SDK empacotado de Flutter pra linux-arm64 (flutter-action
      # falha em host ARM). O caminho suportado é rodar a partir do git: o
      # tool se bootstrapa e baixa os artefatos de engine arm64.
      - name: Flutter arm64 (via git)
        if: matrix.deb_arch == 'arm64'
        run: |
          git clone --depth 1 --branch "$FLUTTER_VERSION" https://github.com/flutter/flutter.git "$RUNNER_TEMP/flutter"
          echo "$RUNNER_TEMP/flutter/bin" >> "$GITHUB_PATH"

      - name: Deps de sistema (GTK, ninja, rpmbuild, libmpv)
        run: |
          sudo apt-get update
          # libmpv-dev: media_kit linka contra libmpv no Linux (plano 46).
          # Runtime declarado nos pacotes: deb libmpv2 / rpm mpv-libs.
          # libsecret-1-dev: flutter_secure_storage no Linux (senha de banco,
          # plano 51). Runtime: libsecret-1-0.
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev rpm libmpv-dev libsecret-1-dev
          flutter --version
          dart pub global activate fastforge

      - name: Build + empacota
        run: |
          flutter pub get
          flutter build linux --release
          dart pub global run fastforge:main package --platform linux --targets deb
          dart pub global run fastforge:main package --platform linux --targets rpm
          DEB=$(find dist -name "*.deb" | head -1); test -n "$DEB"
          RPM=$(find dist -name "*.rpm" | head -1); test -n "$RPM"
          mkdir -p out
          mv "$DEB" "out/remote-pi-cockpit_${VERSION}_${{ matrix.deb_arch }}.deb"
          mv "$RPM" "out/remote-pi-cockpit-${VERSION}.${{ matrix.rpm_arch }}.rpm"

      - name: Smoke test .deb (instala no próprio runner)
        run: |
          sudo apt-get install -y "./out/remote-pi-cockpit_${VERSION}_${{ matrix.deb_arch }}.deb"
          dpkg -L remote-pi-cockpit | grep -m1 "\.desktop$"

      - name: Smoke test .rpm (container fedora:40)
        run: |
          # rpm -qpl consulta o ARQUIVO (o nome interno do pacote não é
          # remote-pi-cockpit — o maker do Fastforge usa o nome do pubspec).
          docker run --rm -v "$PWD/out:/out:ro" fedora:40 bash -c \
            "dnf install -y /out/remote-pi-cockpit-${VERSION}.${{ matrix.rpm_arch }}.rpm \
             && rpm -qpl /out/remote-pi-cockpit-${VERSION}.${{ matrix.rpm_arch }}.rpm | grep -m1 '\.desktop$'"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.deb_arch }}
          path: cockpit/out/*
          if-no-files-found: error

  publish:
    name: GitHub Release + latest.json
    needs: [meta, macos, windows, linux]
    runs-on: ubuntu-24.04
    env:
      VERSION: ${{ needs.meta.outputs.version }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Gera SHA256SUMS e latest.json
        run: |
          cd release
          sha256sum * > SHA256SUMS
          BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}"
          : > artifacts.ndjson
          for f in *; do
            case "$f" in
              *macos-universal.dmg) p=macos   a=universal fmt=dmg ;;
              *windows-x64.exe)     p=windows a=x64       fmt=exe ;;
              *_amd64.deb)          p=linux   a=x64       fmt=deb ;;
              *_arm64.deb)          p=linux   a=arm64     fmt=deb ;;
              *.x86_64.rpm)         p=linux   a=x64       fmt=rpm ;;
              *.aarch64.rpm)        p=linux   a=arm64     fmt=rpm ;;
              *) continue ;;
            esac
            jq -n --arg platform "$p" --arg arch "$a" --arg format "$fmt" \
              --arg url "$BASE/$f" \
              --arg sha256 "$(sha256sum "$f" | cut -d' ' -f1)" \
              --argjson size "$(stat -c%s "$f")" \
              '{platform:$platform, arch:$arch, format:$format, url:$url, sha256:$sha256, size:$size}' \
              >> artifacts.ndjson
          done
          COUNT=$(jq -s length artifacts.ndjson)
          if [ "$COUNT" -ne 6 ]; then
            echo "::error::esperava 6 artefatos no manifest, achei $COUNT"
            exit 1
          fi
          # Notas: primeira seção do CHANGELOG; fallback genérico.
          NOTES=$(awk '/^## /{n++} n==1' ../cockpit/CHANGELOG.md | tail -n +2 | sed '/^$/d' | head -20)
          [ -n "$NOTES" ] || NOTES="Remote Pi Cockpit ${VERSION}"
          jq -n --arg version "$VERSION" --arg date "$(date -u +%F)" \
            --arg notes "$NOTES" --slurpfile artifacts artifacts.ndjson \
            '{version:$version, date:$date, notes:$notes, artifacts:$artifacts}' \
            > latest.json
          rm artifacts.ndjson
          cat latest.json

      - name: Assina artefatos e gera appcasts (Sparkle/WinSparkle)
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          BUILD: ${{ needs.meta.outputs.build }}
        run: |
          # Plano 47 — assina o .app.zip (macOS) e o .exe (Windows) com a MESMA
          # chave ed25519 (decisão E refinada): ed25519 é determinístico, então
          # PyNaCl gera a assinatura que Sparkle e WinSparkle verificam. Sem
          # ferramenta nativa nos runners — só a chave (secret).
          python3 -m venv "$RUNNER_TEMP/venv"
          "$RUNNER_TEMP/venv/bin/pip" install --quiet pynacl
          cat > "$RUNNER_TEMP/sign.py" <<'PY'
          import base64, os, sys
          from nacl.signing import SigningKey
          seed = base64.b64decode(os.environ['SPARKLE_PRIVATE_KEY'].strip())
          data = open(sys.argv[1], 'rb').read()
          print(base64.b64encode(SigningKey(seed).sign(data).signature).decode())
          PY
          sign() { "$RUNNER_TEMP/venv/bin/python3" "$RUNNER_TEMP/sign.py" "$1"; }
          cd release
          BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}"
          ZIP="Cockpit-${VERSION}-macos.zip"
          EXE="RemotePiCockpit-Setup-${VERSION}-windows-x64.exe"
          test -f "$ZIP"; test -f "$EXE"
          MAC_SIG=$(sign "$ZIP"); MAC_LEN=$(stat -c%s "$ZIP")
          WIN_SIG=$(sign "$EXE"); WIN_LEN=$(stat -c%s "$EXE")
          PUBDATE=$(date -u +"%a, %d %b %Y %H:%M:%S +0000")
          NOTES=$(jq -r .notes latest.json)
          # macOS: sparkle:version = CFBundleVersion (build +n); shortVersion = marketing.
          cat > appcast-macos.xml <<XML
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>Remote Pi Cockpit</title>
              <item>
                <title>${VERSION}</title>
                <pubDate>${PUBDATE}</pubDate>
                <sparkle:version>${BUILD}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>10.15.0</sparkle:minimumSystemVersion>
                <description><![CDATA[${NOTES}]]></description>
                <enclosure url="${BASE}/${ZIP}" sparkle:edSignature="${MAC_SIG}" length="${MAC_LEN}" type="application/octet-stream" />
              </item>
            </channel>
          </rss>
          XML
          # Windows: WinSparkle baixa o .exe do Inno e roda silencioso via
          # sparkle:installerArguments; sparkle:version = versão marketing (bate
          # com o ProductVersion do Runner.rc).
          cat > appcast-windows.xml <<XML
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>Remote Pi Cockpit</title>
              <item>
                <title>${VERSION}</title>
                <pubDate>${PUBDATE}</pubDate>
                <sparkle:version>${VERSION}</sparkle:version>
                <description><![CDATA[${NOTES}]]></description>
                <enclosure url="${BASE}/${EXE}" sparkle:edSignature="${WIN_SIG}" length="${WIN_LEN}" sparkle:os="windows" sparkle:installerArguments="/VERYSILENT /SUPPRESSMSGBOXES /NORESTART /SP-" type="application/octet-stream" />
              </item>
            </channel>
          </rss>
          XML
          echo "== appcast-macos.xml =="; cat appcast-macos.xml
          echo "== appcast-windows.xml =="; cat appcast-windows.xml

      - name: Cria (ou atualiza) a GitHub Release
        run: |
          NOTES_FILE=$(mktemp)
          jq -r .notes release/latest.json > "$NOTES_FILE"
          {
            echo ""
            echo "---"
            echo "**Publicação (gate manual):** baixe \`latest.json\`, \`appcast-macos.xml\`"
            echo "e \`appcast-windows.xml\` desta release e coloque em"
            echo "\`/Users/flutterando/cockpit/data/\` no host do rp-s3 (ver \`rp-s3/README.md\`)."
            echo "O \`latest.json\` liga o card/site (e o notify do Linux); os appcasts ligam"
            echo "o self-update (Sparkle/WinSparkle) dos cockpits já instalados. Até subir,"
            echo "ninguém atualiza."
          } >> "$NOTES_FILE"
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release/* --clobber
          else
            gh release create "$RELEASE_TAG" release/* \
              --title "Remote Pi Cockpit ${VERSION}" \
              --notes-file "$NOTES_FILE" \
              --latest=false
          fi

      - name: Resumo
        run: |
          {
            echo "## Cockpit ${VERSION} publicado"
            echo ""
            echo "Release: https://github.com/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG}"
            echo ""
            echo "**Próximo passo (manual):** baixar \`latest.json\` + \`appcast-macos.xml\`"
            echo "+ \`appcast-windows.xml\` da release e colocar no rp-s3"
            echo "(\`/Users/flutterando/cockpit/data/\`) — liga site/card e o self-update."
          } >> "$GITHUB_STEP_SUMMARY"
