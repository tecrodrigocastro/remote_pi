name: cockpit
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none" # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.13.0+28

environment:
  sdk: ^3.11.5

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

  # MigraĂ§ĂŁo de UI: design system shadcn (componentes, overlays, tema). Substitui
  # o Material como camada de UI na raiz (`ShadcnApp.router`). Pin exato â€” pacote
  # prĂ©-1.0 (API churna). Nota: o `ShadcnApp` jĂˇ injeta
  # `DefaultMaterialLocalizations` (en-US) por padrĂŁo, entĂŁo os widgets de
  # terceiros que embutem Material (xterm, media_kit_video, gpt_markdown)
  # funcionam sem `flutter_localizations`; e `shadcn_flutter.dart` jĂˇ re-exporta
  # `Icons`, entĂŁo mantemos os Material Icons sem import extra.
  shadcn_flutter: 0.0.52

  # DI + roteamento + estado page-scoped num pacote sĂł: cada feature Ă© um mĂłdulo
  # (`createModule`) que declara suas rotas + binds. Substitui provider +
  # auto_injector + go_router (removidos). Ver `lib/app/` e CLAUDE.md.
  flutter_modular: ^7.1.0

  # Plano 37 â€” seleĂ§ĂŁo de pasta (NSOpenPanel no macOS) para abrir um projeto.
  file_picker: ^8.1.2

  # Plano 51 â€” senha de conexĂŁo no cofre nativo do SO (Keychain / Credential
  # Manager / Secret Service). Nunca em .cockpit/databases.json.
  flutter_secure_storage: ^9.0.0

  # Wave 2 â€” persistĂŞncia local dos projetos (pasta salva = projeto).
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Wave 2 â€” fontes da identidade visual (Space Grotesk / Hanken Grotesk /
  # JetBrains Mono), servidas em runtime + cacheadas pelo google_fonts.
  google_fonts: ^6.2.1

  # Wave 2 â€” renderiza o Markdown (GFM + code) da resposta do agente.
  gpt_markdown: ^1.1.8

  # Wave 2 â€” notificaĂ§Ăµes nativas do SO (agente terminou um turno).
  flutter_local_notifications: ^18.0.1

  # Wave 2 â€” esconde a barra nativa da janela (temos a customizada) e permite
  # arrastar/min/max pela nossa barra. macOS/Windows/Linux.
  window_manager: ^0.4.3

  # Wave 2 â€” aba de terminal: emulador + widget (xterm) + PTY nativo
  # (kyroon_pty: PTY em cĂłdigo nativo â€” forkpty no macOS/Linux, ConPTY no
  # Windows 10 1809+; mais estĂˇvel e mantido que o flutter_pty antigo).
  # xterm foi ABSORVIDO como mĂłdulo interno em lib/app/core/terminal/xterm/
  # (2026-07-19): o upstream (TerminalStudio/xterm.dart) estĂˇ parado, o projeto
  # jĂˇ mantinha fork git + view/render forkados no repo, e o app importava
  # internals (src/). Emulador Ă© Dart puro (zero nativo). Deps diretas do
  # vendor: quiver (+ meta via SDK).
  quiver: ^3.0.0
  kyroon_pty: ^1.0.4

  # Wave 2 â€” viewer de arquivo: renderiza SVG no pane (PNG/JPEG via Image.file).
  flutter_svg: ^2.0.10

  # Plano 46 â€” preview de Ăˇudio e vĂ­deo no viewer (libmpv via media_kit): um
  # motor sĂł cobre A/V, com aceleraĂ§ĂŁo de hardware, cross-platform. O
  # `media_kit_libs_video` embarca a libmpv em macOS/Windows; no Linux usamos a
  # do sistema (ver linux/packaging/*). NOTA: registrar no plano 46.
  media_kit: ^1.1.10
  media_kit_video: ^1.2.4
  media_kit_libs_video: ^1.0.4

  # Wave 2 â€” syntax highlight no viewer de texto. Port Dart do highlight.js; o
  # import default registra todas as 189 linguagens + aliases. Convertemos a
  # Ăˇrvore de nĂłs em TextSpan e pintamos com a paleta `SyntaxColors` do tema.
  # NOTA: registrar esta dep no plano 37 (responsabilidade do orquestrador).
  highlight: ^0.7.0

  # Wave 2 â€” colar imagem/arquivos do clipboard (Cmd/Ctrl+V) no composer. O
  # `Clipboard` do Flutter sĂł lĂŞ texto; o pasteboard lĂŞ imagem (bytes) e paths.
  # NOTA: registrar esta dep no plano 37 (responsabilidade do orquestrador).
  pasteboard: ^0.4.0

  # DiretĂłrio de applicationSupport pra persistir o scrollback dos terminais
  # (replay apĂłs restart). JĂˇ vinha transitivo via Hive; promovido a dep direta.
  path_provider: ^2.1.0

  # Wave 2 â€” arrastar arquivos do SO (Finder/Explorer/etc.) pro input. O
  # drag-drop interno do Flutter nĂŁo pega drops nativos; o desktop_drop cobre
  # macOS/Linux/Windows. NOTA: registrar esta dep no plano 37.
  desktop_drop: ^0.5.0

  # Wave 2 â€” header fixo (sticky) por turno no chat: a pergunta do usuĂˇrio fica
  # pinada no topo enquanto a resposta rola. NOTA: registrar no plano 37.
  flutter_sticky_header: ^0.8.0

  # Conectividade (Fatia 3 â€” pareamento) â€” renderiza a URI de pareamento do
  # `remote-pi` como QR Code no dialog. NOTA: registrar esta dep no plano 37.
  qr_flutter: ^4.1.0

  # Windows-only â€” cliente de named pipe (Win32 FFI) pra falar com o supervisor,
  # que no Windows escuta em `\\.\pipe\â€¦` em vez de UDS. Ver
  # lib/data/daemon/win_named_pipe.dart.
  ffi: ^2.1.0
  win32: ^5.5.0

  # Aviso de atualizaĂ§ĂŁo in-app (plano 43, passo 7): versĂŁo atual do app
  # (package_info_plus) + abrir a URL do artefato no navegador (url_launcher).
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.0

  # Plano 47 â€” self-update nativo: Sparkle (macOS) + WinSparkle (Windows) via o
  # plugin federado auto_updater. No Linux Ă© no-op (NoopSelfUpdater) e o caminho
  # de notify+download manual (UpdateChecker/UpdateCard) assume. O macOS embarca
  # o Sparkle.framework via CocoaPods; o Windows vendoriza a WinSparkle.dll.
  auto_updater: ^1.0.0

  # Plano 51 â€” drivers de banco da DB tab via anakiORM (conectores Rust/FFI;
  # SQLite + Postgres + MySQL + MSSQL). A FFI bloqueia â†’ roda em Isolate
  # (AnakiDbDriver). BinĂˇrios vĂŞm por native assets do prĂłprio pacote.
  #
  # Publicado no pub.dev com os fixes de native assets: binĂˇrios no pacote
  # (#4), loader via asset-id (#6), build universal macOS corrigido (0.1.3 â€”
  # cada arch escreve no prĂłprio outputDirectory, sem colisĂŁo no lipo).
  anaki_orm: ^0.1.1
  anaki_sqlite: ^0.1.3
  anaki_postgres: ^0.1.3
  anaki_mysql: ^0.1.4
  anaki_mssql: ^0.1.3
  # NoSQL/cache â€” acesso APENAS via CLI por enquanto (sem UI); ver plano 51.
  anaki_redis: ^0.1.3
  anaki_mongodb: ^0.1.3

dependency_overrides:

  # Fork do kyroon_pty com dois fixes no `kyroon_pty_win.c`:
  #
  # 1. UB em `build_working_directory`, que quebrava o spawn de PTY no Windows
  #    ARM (v1.0.5).
  # 2. `build_command` duplicava o executĂˇvel na command line do CreateProcessW
  #    (`pwsh.exe pwsh.exe`), porque o `arguments[0]` jĂˇ Ă© o executĂˇvel. Shells
  #    tolerantes mascaravam (o powershell.exe abria um shell aninhado), mas o
  #    PowerShell 7 recusa e o `wsl.exe -d <distro>` abria a distro ERRADA
  #    (v1.0.6).
  #
  # PR aberto pro upstream (cesarmod2017/kyroon_pty); voltar pro pub.dev quando
  # publicarem >= 1.0.6.
  kyroon_pty:
    git:
      url: https://github.com/jacobaraujo7/kyroon_pty
      ref: v1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0
  # Usado sĂł pelos testes vendorizados do emulador (core/terminal/xterm);
  # os .mocks.dart jĂˇ vĂŞm gerados â€” sem build_runner.
  mockito: ^5.4.0

