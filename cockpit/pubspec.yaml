name: cockpit
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none" # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.11.0+26

environment:
  sdk: ^3.11.5

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

  # Migração de UI: design system shadcn (componentes, overlays, tema). Substitui
  # o Material como camada de UI na raiz (`ShadcnApp.router`). Pin exato — pacote
  # pré-1.0 (API churna). Nota: o `ShadcnApp` já injeta
  # `DefaultMaterialLocalizations` (en-US) por padrão, então os widgets de
  # terceiros que embutem Material (xterm, media_kit_video, gpt_markdown)
  # funcionam sem `flutter_localizations`; e `shadcn_flutter.dart` já re-exporta
  # `Icons`, então mantemos os Material Icons sem import extra.
  shadcn_flutter: 0.0.52

  # DI + roteamento + estado page-scoped num pacote só: cada feature é um módulo
  # (`createModule`) que declara suas rotas + binds. Substitui provider +
  # auto_injector + go_router (removidos). Ver `lib/app/` e CLAUDE.md.
  flutter_modular: ^7.1.0

  # Plano 37 — seleção de pasta (NSOpenPanel no macOS) para abrir um projeto.
  file_picker: ^8.1.2

  # Plano 51 — senha de conexão no cofre nativo do SO (Keychain / Credential
  # Manager / Secret Service). Nunca em .cockpit/databases.json.
  flutter_secure_storage: ^9.0.0

  # Wave 2 — persistência local dos projetos (pasta salva = projeto).
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Wave 2 — fontes da identidade visual (Space Grotesk / Hanken Grotesk /
  # JetBrains Mono), servidas em runtime + cacheadas pelo google_fonts.
  google_fonts: ^6.2.1

  # Wave 2 — renderiza o Markdown (GFM + code) da resposta do agente.
  gpt_markdown: ^1.1.7

  # Wave 2 — notificações nativas do SO (agente terminou um turno).
  flutter_local_notifications: ^18.0.1

  # Wave 2 — esconde a barra nativa da janela (temos a customizada) e permite
  # arrastar/min/max pela nossa barra. macOS/Windows/Linux.
  window_manager: ^0.4.3

  # Wave 2 — aba de terminal: emulador + widget (xterm) + PTY nativo
  # (kyroon_pty: PTY em código nativo — forkpty no macOS/Linux, ConPTY no
  # Windows 10 1809+; mais estável e mantido que o flutter_pty antigo).
  xterm: ^4.0.0
  kyroon_pty: ^1.0.4

  # Wave 2 — viewer de arquivo: renderiza SVG no pane (PNG/JPEG via Image.file).
  flutter_svg: ^2.0.10

  # Plano 46 — preview de áudio e vídeo no viewer (libmpv via media_kit): um
  # motor só cobre A/V, com aceleração de hardware, cross-platform. O
  # `media_kit_libs_video` embarca a libmpv em macOS/Windows; no Linux usamos a
  # do sistema (ver linux/packaging/*). NOTA: registrar no plano 46.
  media_kit: ^1.1.10
  media_kit_video: ^1.2.4
  media_kit_libs_video: ^1.0.4

  # Wave 2 — syntax highlight no viewer de texto. Port Dart do highlight.js; o
  # import default registra todas as 189 linguagens + aliases. Convertemos a
  # árvore de nós em TextSpan e pintamos com a paleta `SyntaxColors` do tema.
  # NOTA: registrar esta dep no plano 37 (responsabilidade do orquestrador).
  highlight: ^0.7.0

  # Wave 2 — colar imagem/arquivos do clipboard (Cmd/Ctrl+V) no composer. O
  # `Clipboard` do Flutter só lê texto; o pasteboard lê imagem (bytes) e paths.
  # NOTA: registrar esta dep no plano 37 (responsabilidade do orquestrador).
  pasteboard: ^0.4.0

  # Diretório de applicationSupport pra persistir o scrollback dos terminais
  # (replay após restart). Já vinha transitivo via Hive; promovido a dep direta.
  path_provider: ^2.1.0

  # Wave 2 — arrastar arquivos do SO (Finder/Explorer/etc.) pro input. O
  # drag-drop interno do Flutter não pega drops nativos; o desktop_drop cobre
  # macOS/Linux/Windows. NOTA: registrar esta dep no plano 37.
  desktop_drop: ^0.5.0

  # Wave 2 — header fixo (sticky) por turno no chat: a pergunta do usuário fica
  # pinada no topo enquanto a resposta rola. NOTA: registrar no plano 37.
  flutter_sticky_header: ^0.8.0

  # Conectividade (Fatia 3 — pareamento) — renderiza a URI de pareamento do
  # `remote-pi` como QR Code no dialog. NOTA: registrar esta dep no plano 37.
  qr_flutter: ^4.1.0

  # Windows-only — cliente de named pipe (Win32 FFI) pra falar com o supervisor,
  # que no Windows escuta em `\\.\pipe\…` em vez de UDS. Ver
  # lib/data/daemon/win_named_pipe.dart.
  ffi: ^2.1.0
  win32: ^5.5.0

  # Aviso de atualização in-app (plano 43, passo 7): versão atual do app
  # (package_info_plus) + abrir a URL do artefato no navegador (url_launcher).
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.0

  # Plano 47 — self-update nativo: Sparkle (macOS) + WinSparkle (Windows) via o
  # plugin federado auto_updater. No Linux é no-op (NoopSelfUpdater) e o caminho
  # de notify+download manual (UpdateChecker/UpdateCard) assume. O macOS embarca
  # o Sparkle.framework via CocoaPods; o Windows vendoriza a WinSparkle.dll.
  auto_updater: ^1.0.0

  # Plano 51 — drivers de banco da DB tab via anakiORM (conectores Rust/FFI;
  # SQLite + Postgres + MySQL + MSSQL). A FFI bloqueia → roda em Isolate
  # (AnakiDbDriver). Dylibs buildados do rust/ do repo e copiados pro bundle
  # pelo macos/build_cli.sh (dev: ~/.cockpit/anaki).
  #
  # Enquanto acompanhamos os fixes em andamento do anaki (issues #4/#5), os
  # pacotes são resolvidos do repo LOCAL via `dependency_overrides` abaixo —
  # as versões aqui viram no-op. Remover os overrides quando publicarem.
  anaki_orm: ^0.1.0
  anaki_sqlite: ^0.1.0
  anaki_postgres: ^0.1.0
  anaki_mysql: ^0.1.0
  anaki_mssql: ^0.1.0

dependency_overrides:
  # anakiORM (plano 51) — TEMPORÁRIO: rastreia os fixes em andamento do repo
  # local (issues #4/#5) em vez das versões publicadas. Cobre a resolução
  # transitiva (os sub-pacotes referenciam anaki_orm do pub.dev). Remover todo
  # este bloco quando o anaki publicar as correções.
  anaki_orm:
    path: /Users/jacob/Projects/anakiORM/packages/anaki_orm
  anaki_sqlite:
    path: /Users/jacob/Projects/anakiORM/packages/anaki_sqlite
  anaki_postgres:
    path: /Users/jacob/Projects/anakiORM/packages/anaki_postgres
  anaki_mysql:
    path: /Users/jacob/Projects/anakiORM/packages/anaki_mysql
  anaki_mssql:
    path: /Users/jacob/Projects/anakiORM/packages/anaki_mssql

  # Fork do xterm, por dois motivos:
  #
  # 1. Render procedural de Block Elements (U+2580–259F) e Box Drawing
  #    (U+2500–257F): o xterm 4.0 pinta esses glifos com a fonte (no tamanho
  #    natural, não esticados pra célula), deixando frestas entre células —
  #    half-blocks de arte de pixel (mascote do Claude) saem listrados e bordas
  #    de TUI não conectam. O fork desenha os blocos/bordas proceduralmente,
  #    preenchendo a célula exata, como os terminais nativos.
  # 2. `viewId` no `TextInputConfiguration` do `CustomTextEdit`: sem ele o
  #    `TextInput.setClient` é rejeitado ("Could not set client, view ID is
  #    null") e o IME nunca anexa — no Windows isso mata a digitação. Era a razão
  #    do `hardwareKeyboardOnly: Platform.isWindows` no `pane_view`, agora
  #    removido.
  #
  # PR para o upstream (TerminalStudio/xterm.dart) pendente; voltar pro pub.dev
  # quando mergeado. O SHA exato fica no `pubspec.lock` (`resolved-ref`).
  xterm:
    git:
      url: https://github.com/jacobaraujo7/xterm.dart
      ref: feat/builtin-block-glyphs
  gpt_markdown:
    git:
      url: https://github.com/jacobaraujo7/gpt_markdown
      ref: v1.2.2
  # Fork do kyroon_pty com dois fixes no `kyroon_pty_win.c`:
  #
  # 1. UB em `build_working_directory`, que quebrava o spawn de PTY no Windows
  #    ARM (v1.0.5).
  # 2. `build_command` duplicava o executável na command line do CreateProcessW
  #    (`pwsh.exe pwsh.exe`), porque o `arguments[0]` já é o executável. Shells
  #    tolerantes mascaravam (o powershell.exe abria um shell aninhado), mas o
  #    PowerShell 7 recusa e o `wsl.exe -d <distro>` abria a distro ERRADA
  #    (v1.0.6).
  #
  # PR aberto pro upstream (cesarmod2017/kyroon_pty); voltar pro pub.dev quando
  # publicarem >= 1.0.6.
  kyroon_pty:
    git:
      url: https://github.com/jacobaraujo7/kyroon_pty
      ref: v1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # Ícones de arquivo/pasta por extensão (material-icon-theme, MIT). O mapa
  # arquivo->ícone é gerado em lib/ui/core/file_icons/file_icon_map.g.dart.
  assets:
    - assets/file_icons/
    - assets/sounds/
    - assets/branding/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
